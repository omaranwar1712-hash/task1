
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Course</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Personal Course Organizer</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="courses.html">My Courses</a></li>
                <li><a href="add-course.html">Add Course</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="form-container">
            <h2>Add a New Course</h2>
            <form>
                <div class="form-group">
                    <label for="courseName">Course Name:</label>
                    <input type="text" id="courseName" name="courseName" required>
                </div>

                <div class="form-group">
                    <label for="instructor">Instructor:</label>
                    <input type="text" id="instructor" name="instructor" required>
                </div>

                <div class="form-group">
                    <label for="hours">Credit Hours:</label>
                    <input type="number" id="hours" name="hours" min="1" max="5">
                </div>

                <div class="form-group">
                    <label for="notes">Notes:</label>
                    <textarea id="notes" name="notes" rows="4"></textarea>
                </div>

                <button type="submit" class="submit-btn">Add Course</button>
            </form>
        </section>
    </main>

    <footer>
        <p>designed by omar anwar 2026 - Personal Course Organizer</p>
    </footer>

</body>
</html>
